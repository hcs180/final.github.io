    <section class="sub-hero">
      <div class="container-xl">
        <p class="eyebrow">Contact</p>
        <h1>聯絡與留言</h1>
      </div>
    </section>
    <section class="section-pad">
      <div class="container-xl">
        <div class="contact-panel reveal">
          <div>
            <p class="eyebrow dark">Contact Info</p>
            <h2>如有興趣可透過以下方式聯絡我或留言給我!</h2>
            <div class="contact-links">
              <a href="mailto:ryan05630@gmail.com">ryan05630@gmail.com</a>
              <a href="https://github.com/hcs180" target="_blank" rel="noopener">https://github.com/hcs180</a>
              <a href="index.html">回到首頁</a>
            </div>
          </div>
          <form class="demo-form" id="contactForm" novalidate>
            <div class="form-row"><label for="name">姓名</label><input id="name" name="name" type="text" placeholder="請輸入姓名"></div>
            <div class="form-row"><label for="email">Email</label><input id="email" name="email" type="email" placeholder="name@example.com"></div>
            <div class="form-row"><label for="topic">主題</label><select id="topic" name="topic"><option value="">請選擇主題</option><option>作品交流</option><option>課程作業</option><option>其他</option></select></div>
            <div class="form-row"><label for="message">留言內容</label><textarea id="message" name="message" rows="5" placeholder="請輸入留言，至少 10 個字"></textarea></div>
            <div class="form-actions"><button type="submit">送出示範</button><button type="button" class="ghost-btn" id="clearDraft">清除草稿</button></div>
            <p id="formNotice" class="form-notice" aria-live="polite"></p>
          </form>
        </div>
      </div>
